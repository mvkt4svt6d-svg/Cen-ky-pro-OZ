<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ceník</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    background:#00b894;
    color:white;
    font-weight:bold;
}

#vysledek{
    margin-top:25px;
    background:#222;
    padding:20px;
    border-radius:15px;
    font-size:20px;
    line-height:1.8;
}

.label{
    color:#00cec9;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Ceník</h1>

<input
type="text"
id="searchInput"
placeholder="Zadej číslo produktu">

<button onclick="hledej()">
Vyhledat
</button>

<div id="vysledek">
Načítám data...
</div>

<script>

let data = [];

async function nactiData(){

try{

const response =
await fetch('reca_cenik.json');

data =
await response.json();

document.getElementById('vysledek').innerHTML =
"Ceník připraven";

}catch(error){

document.getElementById('vysledek').innerHTML =
"Chyba načítání dat";

}

}

nactiData();

function formatCena(cena){

if(cena === null || cena === undefined){
    return "-";
}

return Number(cena).toLocaleString('cs-CZ',{
minimumFractionDigits:2,
maximumFractionDigits:2
}) + " Kč";

}

function hledej(){

const hledat =
document.getElementById('searchInput')
.value
.trim()
.replace(/\s/g,'')
.toLowerCase();

if(hledat === ""){

document.getElementById('vysledek').innerHTML =
"Zadej číslo produktu";

return;

}

const nalezeno =
data.find(item =>
item.kod
.replace(/\s/g,'')
.toLowerCase()
.includes(hledat)
);

if(!nalezeno){

document.getElementById('vysledek').innerHTML =
"Nenalezeno";

return;

}

document.getElementById('vysledek').innerHTML =

`
<div>
<span class="label">
Název produktu:
</span><br>
${nalezeno.nazev || "-"}
</div>

<br>

<div>
<span class="label">
Cena CZK:
</span><br>
${formatCena(nalezeno.cena)}
</div>

<br>

<div>
<span class="label">
Cenová jednotka:
</span><br>
${nalezeno.jednotka || "-"}
</div>

<br>

<div>
<span class="label">
Počet ks v balení:
</span><br>
${nalezeno.baleni || "-"}
</div>
`;

}

</script>

</body>
</html>
