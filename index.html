<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceník</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
    margin:0;
}

h1{
    text-align:center;
    font-size:48px;
    margin-top:30px;
    margin-bottom:40px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:20px;
    font-size:28px;
    border:none;
    border-radius:20px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:20px;
    font-size:30px;
    font-weight:bold;
    border:none;
    border-radius:20px;
    background:#11d1b0;
    color:white;
    margin-bottom:30px;
}

#vysledek{
    background:#1f1f1f;
    border-radius:25px;
    padding:25px;
    font-size:28px;
    line-height:1.7;
}

.nadpis{
    color:#12dfff;
    font-weight:bold;
    margin-top:20px;
}

</style>
</head>

<body>

<h1>Ceník</h1>

<input
type="text"
id="hledat"
placeholder="Zadej číslo artiklu">

<button onclick="vyhledat()">
Vyhledat
</button>

<div id="vysledek">
Načítám ceník...
</div>

<script>

let cenik = [];

async function nacistCenik(){

    try{

        const response =
        await fetch("./reca_cenik.json?v=" + Date.now());

        cenik = await response.json();

        document.getElementById("vysledek").innerHTML =
        "Ceník připraven";

    }catch(error){

        document.getElementById("vysledek").innerHTML =
        "Chyba při načítání ceníku";

    }

}

function vyhledat(){

    const hledane =
    document.getElementById("hledat")
    .value
    .replace(/\s/g,"")
    .trim();

    if(!hledane){
        return;
    }

    const produkt = cenik.find(p => {

        const artikl =
        String(p.artikl)
        .replace(/\s/g,"")
        .trim();

        return artikl.includes(hledane);

    });

    const vysledek =
    document.getElementById("vysledek");

    if(produkt){

        const cena =
        Number(produkt.cena)
        .toLocaleString("cs-CZ",{
            minimumFractionDigits:2,
            maximumFractionDigits:2
        });

        vysledek.innerHTML = `

        <div class="nadpis">
        Číslo artiklu:
        </div>

        ${produkt.artikl}

        <div class="nadpis">
        Název:
        </div>

        ${produkt.nazev}

        <div class="nadpis">
        Cena:
        </div>

        ${cena} Kč

        <div class="nadpis">
        Cenová jednotka:
        </div>

        ${produkt.jednotka}

        `;

    }else{

        vysledek.innerHTML =
        "Produkt nenalezen";

    }

}

nacistCenik();

</script>

</body>
</html>
