<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ceník OZ</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

select,
input{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    background:#00b894;
    color:white;
    font-weight:bold;
}

#vysledek{
    margin-top:25px;
    background:#222;
    padding:20px;
    border-radius:15px;
    font-size:20px;
    line-height:1.8;
}

.label{
    color:#00cec9;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Ceník OZ</h1>

<select id="cenik">
    <option value="RECA">RECA</option>
    <option value="MILWAUKEE">MILWAUKEE</option>
</select>

<input
type="text"
id="searchInput"
placeholder="Zadej číslo produktu">

<button onclick="hledej()">
Vyhledat
</button>

<div id="vysledek">
Načítám ceníky...
</div>

<script>

let recaData = [];
let milwaukeeData = [];

async function nactiCeniky(){

const recaResponse =
await fetch('Exportní cena HW 2025 Q3.xlsx');

const recaBuffer =
await recaResponse.arrayBuffer();

const recaWorkbook =
XLSX.read(recaBuffer, {type:'array'});

const recaSheet =
recaWorkbook.Sheets[recaWorkbook.SheetNames[0]];

recaData =
XLSX.utils.sheet_to_json(recaSheet, {header:1});

const milwaukeeResponse =
await fetch('RECA netto Q1 2026.xlsx');

const milwaukeeBuffer =
await milwaukeeResponse.arrayBuffer();

const milwaukeeWorkbook =
XLSX.read(milwaukeeBuffer, {type:'array'});

const milwaukeeSheet =
milwaukeeWorkbook.Sheets[milwaukeeWorkbook.SheetNames[0]];

milwaukeeData =
XLSX.utils.sheet_to_json(milwaukeeSheet, {header:1});

document.getElementById('vysledek').innerHTML =
"Ceníky načteny";

}

nactiCeniky();

function formatCena(cena){

cena = Number(cena);

if(isNaN(cena)){
    return "-";
}

return cena.toLocaleString('cs-CZ', {
minimumFractionDigits:2,
maximumFractionDigits:2
}) + " Kč";

}

function hledej(){

const hledat =
document.getElementById('searchInput')
.value
.replace(/\s/g,'')
.toLowerCase();

const typ =
document.getElementById('cenik').value;

let data = [];

if(typ === "RECA"){
    data = recaData;
}else{
    data = milwaukeeData;
}

let nalezeno = null;

for(let i = 0; i < data.length; i++){

const row = data[i];

if(!row || row.length === 0){
    continue;
}

const kod =
String(row[0] || "")
.replace(/\s/g,'')
.toLowerCase();

if(kod.includes(hledat)){

nalezeno = row;
break;

}

}

if(!nalezeno){

document.getElementById('vysledek').innerHTML =
"Nenalezeno";

return;

}

if(typ === "RECA"){

const nazev = nalezeno[1] || "-";
const jednotka = nalezeno[2] || "-";
const cena = formatCena(nalezeno[5]);
const baleni = nalezeno[7] || "-";

document.getElementById('vysledek').innerHTML =

`
<div>
<span class="label">Název produktu:</span><br>
${nazev}
</div>

<br>

<div>
<span class="label">Cena CZK:</span><br>
${cena}
</div>

<br>

<div>
<span class="label">Cenová jednotka:</span><br>
${jednotka}
</div>

<br>

<div>
<span class="label">Počet ks v balení:</span><br>
${baleni}
</div>
`;

}else{

const nazev = nalezeno[1] || "-";
const cena = formatCena(nalezeno[2]);

document.getElementById('vysledek').innerHTML =

`
<div>
<span class="label">Název produktu:</span><br>
${nazev}
</div>

<br>

<div>
<span class="label">Cena CZK:</span><br>
${cena}
</div>
`;

}

}

</script>

</body>
</html>
