<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ceník OZ</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

select,
input{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    background:#00b894;
    color:white;
    font-weight:bold;
}

#vysledek{
    margin-top:25px;
    background:#222;
    padding:20px;
    border-radius:15px;
    font-size:20px;
    line-height:1.8;
}

.label{
    color:#00cec9;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Ceník OZ</h1>

<select id="cenik">
    <option value="HW">HW ceník</option>
    <option value="RECA">RECA ceník</option>
</select>

<input
type="text"
id="searchInput"
placeholder="Zadej číslo produktu">

<button onclick="hledej()">
Vyhledat
</button>

<div id="vysledek">
Načítám ceníky...
</div>

<script>

let hwData = [];
let recaData = [];

Promise.all([

fetch('Exportní cena HW 2025 Q3.xlsx')
.then(response => response.arrayBuffer())
.then(dataBuffer => {

const workbook = XLSX.read(dataBuffer, {type:'array'});

const sheet = workbook.Sheets[workbook.SheetNames[0]];

hwData = XLSX.utils.sheet_to_json(sheet, {header:1});

}),

fetch('RECA netto Q1 2026.xlsx')
.then(response => response.arrayBuffer())
.then(dataBuffer => {

const workbook = XLSX.read(dataBuffer, {type:'array'});

const sheet = workbook.Sheets[workbook.SheetNames[0]];

recaData = XLSX.utils.sheet_to_json(sheet, {header:1});

})

]).then(() => {

document.getElementById('vysledek').innerHTML =
"Ceníky načteny";

});

function formatCena(cena){

cena = Number(cena);

if(isNaN(cena)){
    return "-";
}

return cena.toLocaleString('cs-CZ', {
minimumFractionDigits: 2,
maximumFractionDigits: 2
}) + " Kč";

}

function hledej(){

const hledat =
document.getElementById('searchInput')
.value
.replace(/\s/g,'')
.toLowerCase();

const typCeniku =
document.getElementById('cenik').value;

let data = [];
let nalezeno = null;

if(typCeniku === "HW"){
    data = hwData;
}else{
    data = recaData;
}

for(let i = 0; i < data.length; i++){

const row = data[i];

if(
row[0] &&
row[0]
.toString()
.replace(/\s/g,'')
.toLowerCase()
.includes(hledat)
){

nalezeno = row;
break;

}

}

if(!nalezeno){

document.getElementById('vysledek').innerHTML =
"Nenalezeno";

return;

}

if(typCeniku === "HW"){

const nazev = nalezeno[1] || "-";
const cenovaJednotka = nalezeno[2] || "-";
const cenaCZK = formatCena(nalezeno[5]);
const baleni = nalezeno[7] || "-";

document.getElementById('vysledek').innerHTML =

`
<div>
<span class="label">Název produktu:</span><br>
${nazev}
</div>

<br>

<div>
<span class="label">Cena CZK:</span><br>
${cenaCZK}
</div>

<br>

<div>
<span class="label">Cenová jednotka:</span><br>
${cenovaJednotka}
</div>

<br>

<div>
<span class="label">Počet ks v balení:</span><br>
${baleni}
</div>
`;

}else{

const nazev = nalezeno[1] || "-";
const cenaCZK = formatCena(nalezeno[2]);

document.getElementById('vysledek').innerHTML =

`
<div>
<span class="label">Název produktu:</span><br>
${nazev}
</div>

<br>

<div>
<span class="label">Cena CZK:</span><br>
${cenaCZK}
</div>
`;

}

}

</script>

</body>
</html>
