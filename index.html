<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ceník</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    background:#00b894;
    color:white;
    font-weight:bold;
}

#vysledek{
    margin-top:25px;
    background:#222;
    padding:20px;
    border-radius:15px;
    font-size:20px;
    line-height:1.8;
}

.label{
    color:#00cec9;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Ceník</h1>

<input
type="text"
id="searchInput"
placeholder="Zadej číslo produktu">

<button onclick="hledej()">
Vyhledat
</button>

<div id="vysledek">
Načítám ceník...
</div>

<script>

let data = [];

async function nactiCenik(){

try{

const response =
await fetch('Reca cenik.ods');

const buffer =
await response.arrayBuffer();

const workbook =
XLSX.read(buffer,{
type:'array'
});

const sheet =
workbook.Sheets[workbook.SheetNames[0]];

data =
XLSX.utils.sheet_to_json(sheet,{
header:1
});

document.getElementById('vysledek').innerHTML =
"Ceník načten";

}catch(error){

document.getElementById('vysledek').innerHTML =
"Chyba při načítání ceníku";

}

}

nactiCenik();

function formatCena(cena){

cena =
String(cena)
.replace(",", ".");

cena =
parseFloat(cena);

if(isNaN(cena)){
    return "-";
}

return cena.toLocaleString('cs-CZ',{
minimumFractionDigits:2,
maximumFractionDigits:2
}) + " Kč";

}

function hledej(){

const hledat =
document.getElementById('searchInput')
.value
.trim()
.replace(/\s/g,'')
.toLowerCase();

if(hledat === ""){

document.getElementById('vysledek').innerHTML =
"Zadej číslo produktu";

return;

}

let nalezeno = null;

for(let i = 1; i < data.length; i++){

const row = data[i];

if(!row){
    continue;
}

const kod =
String(row[0] || "")
.replace(/\s/g,'')
.toLowerCase();

if(kod.includes(hledat)){

nalezeno = row;
break;

}

}

if(!nalezeno){

document.getElementById('vysledek').innerHTML =
"Nenalezeno";

return;

}

const nazev =
nalezeno[1] || "-";

const jednotka =
nalezeno[2] || "-";

const cena =
formatCena(nalezeno[3]);

document.getElementById('vysledek').innerHTML =

`
<div>
<span class="label">
Název produktu:
</span><br>
${nazev}
</div>

<br>

<div>
<span class="label">
Cena CZK:
</span><br>
${cena}
</div>

<br>

<div>
<span class="label">
Cenová jednotka:
</span><br>
${jednotka}
</div>
`;

}

</script>

</body>
</html>
