<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ceník OZ</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
    padding:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:20px;
}

button{
    width:100%;
    padding:15px;
    font-size:20px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    background:#00b894;
    color:white;
    font-weight:bold;
}

#vysledek{
    margin-top:25px;
    background:#222;
    padding:20px;
    border-radius:15px;
    font-size:20px;
    line-height:1.8;
}

.label{
    color:#00cec9;
    font-weight:bold;
}

</style>
</head>

<body>

<h1>Ceník OZ</h1>

<input
type="text"
id="searchInput"
placeholder="Zadej číslo produktu">

<button onclick="hledej()">
Vyhledat
</button>

<div id="vysledek">
Načítám ceník...
</div>

<script>

let data = [];

fetch('Exportpreisliste HW 2025 Q3.xlsx')
.then(response => response.arrayBuffer())
.then(dataBuffer => {

const workbook = XLSX.read(dataBuffer, {type:'array'});

const sheet = workbook.Sheets[workbook.SheetNames[0]];

data = XLSX.utils.sheet_to_json(sheet, {header:1});

document.getElementById('vysledek').innerHTML =
"Ceník načten";

});

function hledej(){

const hledat =
document.getElementById('searchInput')
.value
.replace(/\s/g,'')
.toLowerCase();

let nalezeno = null;

for(let i = 0; i < data.length; i++){

const row = data[i];

if(
row[0] &&
row[0]
.toString()
.replace(/\s/g,'')
.toLowerCase()
.includes(hledat)
){

nalezeno = row;
break;

}

}

if(nalezeno){

const nazev = nalezeno[1] || "-";
const cenovaJednotka = nalezeno[2] || "-";

let cenaCZK = nalezeno[5] || 0;

cenaCZK = Number(cenaCZK);

if(!isNaN(cenaCZK)){

cenaCZK =
cenaCZK.toLocaleString('cs-CZ', {
minimumFractionDigits: 2,
maximumFractionDigits: 2
}) + " Kč";

}else{

cenaCZK = "-";

}

const baleni = nalezeno[7] || "-";

document.getElementById('vysledek').innerHTML =

`
<div>
<span class="label">Název produktu:</span><br>
${nazev}
</div>

<br>

<div>
<span class="label">Cena CZK:</span><br>
${cenaCZK}
</div>

<br>

<div>
<span class="label">Cenová jednotka:</span><br>
${cenovaJednotka}
</div>

<br>

<div>
<span class="label">Počet ks v balení:</span><br>
${baleni}
</div>
`;

}else{

document.getElementById('vysledek').innerHTML =
"Nenalezeno";

}

}

</script>

</body>
</html>
